<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电能变换与控制智能体</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>

  <!-- marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>

  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div id="app">
  <!-- 极简 Header -->
  <header id="header">
    <div class="header-left" id="header-left" title="对话目录" onclick="toggleToc()">
      <span class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </span>
      <span class="title">电能变换与控制智能体</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-clear" title="清空对话">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
      <button class="icon-btn" id="btn-theme-toggle" title="切换主题">
        <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- 对话目录侧栏 -->
  <aside class="toc-panel" id="toc-panel">
    <div class="toc-header">
      <span>对话目录</span>
      <button class="toc-close" onclick="toggleToc()">✕</button>
    </div>
    <div class="toc-list" id="toc-list"></div>
  </aside>

  <!-- 对话区域（无卡片包裹，与背景融合） -->
  <main id="chat-area">
    <div class="chat-content" id="chat-content">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <h2>今天想了解什么？</h2>
        <p class="welcome-sub">电力电子教学助手，随时为你解答</p>
        <div class="hints">
          <button class="hint-chip" onclick="sendHint('什么是单相桥式整流电路？')">单相桥式整流</button>
          <button class="hint-chip" onclick="sendHint('Buck电路的工作原理')">Buck电路</button>
          <button class="hint-chip" onclick="sendHint('SPWM的调制原理')">SPWM调制</button>
          <button class="hint-chip" onclick="sendHint('IGBT和MOSFET的区别')">IGBT vs MOSFET</button>
          <button class="hint-chip" onclick="sendHint('帮我分析boost电路的纹波')">Boost纹波分析</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部输入区（浮动） -->
  <footer id="input-area">
    <div class="input-wrapper">
      <textarea id="message-input" rows="3"
        placeholder="输入你的问题... (Enter 发送，Shift+Enter 换行)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <!-- <p class="input-hint">内容由 AI 生成，仅供参考</p> -->
  </footer>

  <!-- 状态栏 -->
  <div id="status-bar"></div>

</div>

<script src="/app.js"></script>
</body>
</html>
